apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-hpa
  namespace: inference
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: llm-service }
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Pods
      pods:
        metric: { name: llm_queue_depth }
        target: { type: AverageValue, averageValue: "5" }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60