apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: llm-service
          image: llm_service:v1
          imagePullPolicy: Never   # образ из kind load
          ports:
            - containerPort: 8000   # REST
            - containerPort: 50051  # gRPC
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            failureThreshold: 30
            periodSeconds: 10   # up to 5 minutes for model to load
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            periodSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          hostPath:
            path: /models   # путь на kind-воркере