apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels: { app: llm-service }
  template:
    metadata:
      labels: { app: llm-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: llm-service
          image: localhost:5001/llm_service:v1
          ports:
            - { containerPort: 8000 }   # REST
            - { containerPort: 50051 }  # gRPC
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "3Gi" }
          livenessProbe:
            httpGet: { path: /v1/health/live, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /v1/health/ready, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - { name: models, mountPath: /models }
      volumes:
        - name: models
          hostPath: { path: /models }   # provided by kind extraMounts