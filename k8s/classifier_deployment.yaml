apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier-service
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels: { app: classifier-service }
  template:
    metadata:
      labels: { app: classifier-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: classifier-service
          image: localhost:5001/classifier_service:v1
          ports:
            - { containerPort: 8001 }   # REST 
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "3Gi" }
          livenessProbe:
            httpGet: { path: /v1/health/live, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /v1/health/ready, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - { name: models, mountPath: /models }
      volumes:
        - name: models
          hostPath: { path: /models }   # provided by kind extraMounts